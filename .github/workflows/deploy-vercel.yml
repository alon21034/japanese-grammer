name: Deploy Vercel

on:
  workflow_dispatch:

concurrency:
  group: deploy-vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          missing=()
          [[ -z "${{ secrets.VERCEL_TOKEN }}" ]] && missing+=("VERCEL_TOKEN")
          [[ -z "${{ secrets.VERCEL_ORG_ID }}" ]] && missing+=("VERCEL_ORG_ID")
          [[ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]] && missing+=("VERCEL_PROJECT_ID")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing GitHub Actions secrets: ${missing[*]}"
            echo "::error::Please set them in Repo Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project artifacts
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
